name: Deploy Backend to VPS

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "scripts/**"
      - "requirements.txt"
      - "data/processed/extracted_data_sahabatai.csv"
      - "deploy/**"
      - ".github/workflows/deploy-backend-vps.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync backend files only
        run: |
          rsync -az --delete \
            --filter='merge deploy/rsync-backend.filter' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/"

      - name: Install deps and restart service
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
          set -e

          APP_DIR="${{ secrets.VPS_APP_DIR }}"
          VENV_DIR="${{ secrets.VPS_VENV_DIR }}"

          mkdir -p "$APP_DIR"

          python3 -m venv "$VENV_DIR"
          "$VENV_DIR/bin/pip" install --upgrade pip
          "$VENV_DIR/bin/pip" install -r "$APP_DIR/requirements.txt"

          sudo systemctl daemon-reload
          sudo systemctl restart coffeemate
          sudo systemctl --no-pager --full status coffeemate || true
          EOF
